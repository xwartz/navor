name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    environment: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22.14.0
          cache: pnpm
      - run: npm install --global npm@^11.5.1
      - run: git fetch origin main
      - run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify tag matches package version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          test "v${VERSION}" = "$GITHUB_REF_NAME"
      - run: pnpm install --frozen-lockfile
      - run: node scripts/release-plan.mjs --check
      - run: node scripts/verify-release.mjs
      - run: node scripts/release-plan.mjs publish
      - name: Package VS Code / Cursor extension
        run: pnpm package:vscode
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VSIX=$(ls extensions/vscode/navor-*.vsix | head -n 1)
          test -f "$VSIX"
          VSIX_NAME=$(basename "$VSIX")
          {
            echo "## Editor extension"
            echo ""
            echo "Install the attached \`${VSIX_NAME}\` in Cursor or VS Code:"
            echo ""
            echo '```bash'
            echo "cursor --install-extension ${VSIX_NAME}"
            echo "# or"
            echo "code --install-extension ${VSIX_NAME}"
            echo '```'
            echo ""
            echo "Or use **Extensions: Install from VSIX…** in the Command Palette."
            echo ""
            echo "---"
            echo ""
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$GITHUB_REF_NAME" \
              -f target_commitish="$GITHUB_SHA" \
              --jq .body
          } > /tmp/release-notes.md
          gh release create "$GITHUB_REF_NAME" "$VSIX" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md
